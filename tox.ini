[tox]
envlist = pre-commit, pylint, bandit, audit, pytest

[testenv]
ignore_outcome = True
deps =
    pytest
    pytest-mock
    pytest-structlog
setenv = DJANGO_SETTINGS_MODULE=crczp.sandbox_service_project.tests.settings
passenv = PYPI_DOWNLOAD_URL

[testenv:pylint]
deps = pylint
commands = pylint crczp tests --output-format=colorized --fail-under=9.5

[testenv:bandit]
deps = bandit
commands = bandit -r crczp -c pyproject.toml

[testenv:audit]
deps = pip-audit
commands = pip-audit --progress-spinner=off .

[testenv:pytest]
testpaths = crczp/sandbox_ansible_app/tests
            crczp/sandbox_common_lib/tests
            crczp/sandbox_definition_app/tests
            crczp/sandbox_instance_app/tests
            crczp/sandbox_service_project/tests
commands = pytest
markers = integration

# pre-commit covers ruff lint, ruff format, mypy
[testenv:pre-commit]
deps = pre-commit
commands = pre-commit run --all-files --show-diff-on-failure
