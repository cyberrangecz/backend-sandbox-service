[tox]
envlist = pre-commit, pylint, bandit, audit, pytest

[testenv]
setenv = DJANGO_SETTINGS_MODULE=crczp.sandbox_service_project.tests.settings
passenv = PYPI_DOWNLOAD_URL

# Envs below install the project via `uv sync` (uv-venv-lock-runner) so that
# [tool.uv.sources] git overrides in the lockfile are honored. The default
# tox-uv runner installs with `uv pip install`, which ignores those sources and
# fails to resolve the in-development crczp-* deps from PyPI.
[testenv:pylint]
runner = uv-venv-lock-runner
dependency_groups =
    lint
    test
setenv = DJANGO_SETTINGS_MODULE=crczp.sandbox_service_project.settings
commands = pylint crczp --load-plugins=pylint_django --output-format=colorized --fail-under=9.5

# bandit does static AST analysis and never imports the code, so skip the install.
[testenv:bandit]
skip_install = true
deps = bandit
commands = bandit -r crczp -c pyproject.toml

[testenv:audit]
runner = uv-venv-lock-runner
dependency_groups = audit
commands = pip-audit --progress-spinner=off
ignore_outcome = true

[testenv:pytest]
runner = uv-venv-lock-runner
dependency_groups = test
testpaths = crczp/sandbox_ansible_app/tests
            crczp/sandbox_common_lib/tests
            crczp/sandbox_definition_app/tests
            crczp/sandbox_instance_app/tests
            crczp/sandbox_service_project/tests
commands =
    pytest -m "not integration" {posargs}
    pytest -m "integration" {posargs}
    python manage.py check

# pre-commit covers ruff lint, ruff format, mypy. The hooks manage their own
# envs (ruff, uv-lock) or run via `uv run` (mypy), so the project doesn't need
# to be installed into this env — skip it to avoid the `uv pip install` resolve.
[testenv:pre-commit]
skip_install = true
deps = pre-commit
commands =
    pre-commit run --all-files --show-diff-on-failure
