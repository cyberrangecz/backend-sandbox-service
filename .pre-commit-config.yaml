repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-check
        name: ruff-lint
        args:
          - --output-format=github

      - id: ruff-format
        name: ruff-format
        args:
          - --check

  # swithc to ty after release
  # https://github.com/astral-sh/ty/issues/269
  # Use a local hook so mypy runs in the project venv (django-stubs plugin needs
  # all project deps, e.g. yamlize, to be importable when Django settings load).
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy
        args: [crczp/]
        types: [python]
        pass_filenames: false
