repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-check
        name: ruff-lint
        args:
          - --output-format=github

      - id: ruff-format
        name: ruff-format
        args:
          - --check

  # Check if the lockfile is up to date with the current dependencies.
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.11.24
    hooks:
      - id: uv-lock

  # swithc to ty after release
  # https://github.com/astral-sh/ty/issues/269
  # Use a local hook so mypy runs in the project venv (django-stubs plugin needs
  # all project deps, e.g. yamlize, to be importable when Django settings load).
  - repo: local
    hooks:
      - id: check-version-bump
        name: check version bump
        language: system
        entry: 'bash -c ''current=$(git show :pyproject.toml 2>/dev/null | grep -m1 "^version" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+"); latest_tag=$(git tag --sort=-version:refname | grep -E "^v?[0-9]+\.[0-9]+\.[0-9]+$" | head -1 | sed "s/^v//"); [ -z "$latest_tag" ] && exit 0; [ "$current" = "$latest_tag" ] && { echo "Version not bumped (still $current, latest tag $latest_tag)" >&2; exit 1; }; echo "Version OK $latest_tag -> $current"'''
        pass_filenames: false
        always_run: true

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        language: system
        entry: uv run mypy
        args: [crczp/]
        types: [python]
        pass_filenames: false
